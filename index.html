<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pastoral Vadi</title>
  <meta name="theme-color" content="#1D9E75" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Pastoral Vadi" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0e8; }

    #toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px;
      background: white;
      border-bottom: 1px solid #e0d8cc;
      flex-wrap: wrap;
      position: sticky; top: 0; z-index: 50;
    }
    #toolbar-title {
      font-size: 14px; font-weight: 600; color: #2c2c2a;
      margin-right: 4px; flex-shrink: 0;
    }
    .color-btn {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: transform 0.15s; flex-shrink: 0;
    }
    .color-btn:hover { transform: scale(1.2); }
    .color-btn.active { border-color: #2c2c2a; }
    #add-pin-btn {
      font-size: 12px; padding: 5px 10px;
      border-radius: 8px;
      background: #f0ece4;
      border: 1px solid #d0c8bc;
      color: #2c2c2a; cursor: pointer;
      white-space: nowrap; margin-left: auto;
    }
    #add-pin-btn.active { background: #1D9E75; color: white; border-color: #1D9E75; }

    #map-container {
      position: relative;
      width: 100%; height: calc(100vh - 100px);
      overflow: hidden;
      background: #e8dcc8;
      cursor: grab;
      touch-action: none;
    }
    #map-container.adding { cursor: crosshair; }
    #map-container.dragging { cursor: grabbing; }
    #map-img {
      position: absolute; top: 0; left: 0;
      transform-origin: 0 0;
      user-select: none; pointer-events: none;
      display: block;
    }
    #pins-layer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .pin {
      position: absolute;
      transform: translate(-50%, -100%);
      pointer-events: all; cursor: pointer; z-index: 10;
    }
    .pin-icon {
      width: 28px; height: 28px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2px solid rgba(255,255,255,0.85);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.15s;
    }
    .pin:hover .pin-icon { transform: rotate(-45deg) scale(1.2); }
    .pin-dot {
      width: 8px; height: 8px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%; transform: rotate(45deg);
    }
    .pin-label {
      position: absolute; top: -4px; left: 32px;
      background: white;
      border: 1px solid #e0d8cc;
      border-radius: 8px;
      padding: 3px 8px;
      font-size: 11px; font-weight: 600; color: #2c2c2a;
      white-space: nowrap; pointer-events: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .pin-last-water {
      display: block;
      font-size: 10px; font-weight: 400;
      color: #888; margin-top: 1px;
    }

    #hint {
      font-size: 12px; color: #888;
      padding: 6px 12px; text-align: center;
      background: white;
      border-top: 1px solid #e0d8cc;
    }

    /* MODAL */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200; display: none;
      align-items: flex-end; justify-content: center;
      padding-bottom: env(safe-area-inset-bottom);
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: white;
      border-radius: 16px 16px 0 0;
      padding: 20px 20px 32px;
      width: 100%; max-width: 480px;
    }
    #modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #2c2c2a; }
    #modal input[type="text"] {
      width: 100%; padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d0c8bc;
      background: #f5f0e8;
      color: #2c2c2a; font-size: 15px;
      margin-bottom: 14px;
    }
    .modal-section-label {
      font-size: 12px; color: #888; margin-bottom: 8px;
    }
    .modal-colors {
      display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .modal-color-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
    }
    .modal-color-btn.active { border-color: #2c2c2a; }

    /* Sulama kaydı alanı */
    #water-section { margin-bottom: 16px; }
    #water-section label { font-size: 12px; color: #888; display: block; margin-bottom: 6px; }
    #water-duration {
      width: 100%; padding: 8px 12px;
      border-radius: 8px; border: 1px solid #d0c8bc;
      background: #f5f0e8; color: #2c2c2a;
      font-size: 15px; margin-bottom: 8px;
    }
    #log-water-btn {
      width: 100%; padding: 10px;
      border-radius: 8px;
      background: #1D9E75; color: white;
      border: none; font-size: 14px; font-weight: 600;
      cursor: pointer; margin-bottom: 12px;
    }
    #water-history { font-size: 12px; color: #888; }
    #water-history .water-entry {
      padding: 4px 0; border-bottom: 1px solid #f0ece4;
      display: flex; justify-content: space-between;
    }

    .modal-btns { display: flex; gap: 8px; margin-top: 4px; }
    .modal-btns button {
      flex: 1; padding: 10px;
      border-radius: 8px;
      border: 1px solid #d0c8bc;
      font-size: 14px; cursor: pointer;
      background: #f5f0e8; color: #2c2c2a;
    }
    .btn-delete { background: #fef0ee !important; color: #c0392b !important; border-color: #f5c6c0 !important; }
    .btn-save { background: #1D9E75 !important; color: white !important; border-color: #1D9E75 !important; }
  </style>
</head>
<body>

<div id="app">
  <div id="toolbar">
    <span id="toolbar-title">🌿 Pastoral Vadi</span>
    <div class="color-btn active" data-color="#1D9E75" style="background:#1D9E75"></div>
    <div class="color-btn" data-color="#378ADD" style="background:#378ADD"></div>
    <div class="color-btn" data-color="#D85A30" style="background:#D85A30"></div>
    <div class="color-btn" data-color="#D4537E" style="background:#D4537E"></div>
    <div class="color-btn" data-color="#BA7517" style="background:#BA7517"></div>
    <div class="color-btn" data-color="#7F77DD" style="background:#7F77DD"></div>
    <div class="color-btn" data-color="#888780" style="background:#888780"></div>
    <button id="add-pin-btn">📍 Pin ekle</button>
  </div>

  <div id="map-container">
    <img id="map-img" alt="Pastoral Vadi haritası" draggable="false" />
    <div id="pins-layer"></div>
  </div>

  <div id="hint">Kaydır • İki parmakla yaklaştır • Pin ekle'ye bas, haritaya dokun</div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title">Pin</h3>
    <input type="text" id="pin-name-input" placeholder="Bölge adı (örn: A Bölümü)" maxlength="40" />

    <div class="modal-section-label">Renk</div>
    <div class="modal-colors" id="modal-colors"></div>

    <div id="water-section">
      <label>Sulama kaydı ekle (dakika)</label>
      <input type="number" id="water-duration" placeholder="Kaç dakika suladın?" min="1" max="999" />
      <button id="log-water-btn">💧 Sulamayı kaydet</button>
      <div id="water-history"></div>
    </div>

    <div class="modal-btns">
      <button class="btn-delete" id="modal-delete" style="display:none">Sil</button>
      <button id="modal-cancel">İptal</button>
      <button class="btn-save" id="modal-save">Kaydet</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'pastoral_vadi_v2';
const COLORS = ['#1D9E75','#378ADD','#D85A30','#D4537E','#BA7517','#7F77DD','#888780','#E24B4A'];

// --- Harita görseli: buraya kendi görselinin URL'sini yaz ---
// GitHub'a haritayı yükledikten sonra bu satırı güncelle:
const MAP_URL = 'harita.jpeg';

let pins = [];
let addingMode = false;
let selectedColor = '#1D9E75';
let editingPinId = null;
let modalColor = '#1D9E75';
let scale = 1, offsetX = 0, offsetY = 0;
let isPanning = false, panStart = null;
let pinDragging = null;
let lastTouchDist = null;

const mapContainer = document.getElementById('map-container');
const mapImg = document.getElementById('map-img');
const pinsLayer = document.getElementById('pins-layer');
const addPinBtn = document.getElementById('add-pin-btn');
const modalOverlay = document.getElementById('modal-overlay');
const pinNameInput = document.getElementById('pin-name-input');
const modalDelete = document.getElementById('modal-delete');
const modalColors = document.getElementById('modal-colors');
const waterDuration = document.getElementById('water-duration');
const waterHistory = document.getElementById('water-history');

function loadData() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) pins = JSON.parse(d);
  } catch(e) { pins = []; }
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(pins)); } catch(e) {}
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  const h = Math.floor(m / 60);
  const d = Math.floor(h / 24);
  if (d > 0) return d + ' gün önce';
  if (h > 0) return h + ' saat önce';
  if (m > 0) return m + ' dakika önce';
  return 'az önce';
}

function applyTransform() {
  mapImg.style.transform = `translate(${offsetX}px,${offsetY}px) scale(${scale})`;
}

function containerToMap(cx, cy) {
  return { x: (cx - offsetX) / scale, y: (cy - offsetY) / scale };
}

function mapToContainer(mx, my) {
  return { x: mx * scale + offsetX, y: my * scale + offsetY };
}

function renderPins() {
  pinsLayer.innerHTML = '';
  pins.forEach(pin => {
    const c = mapToContainer(pin.x, pin.y);
    const el = document.createElement('div');
    el.className = 'pin';
    el.dataset.id = pin.id;
    el.style.left = c.x + 'px';
    el.style.top = c.y + 'px';

    const lastWater = pin.waterLog && pin.waterLog.length > 0
      ? pin.waterLog[pin.waterLog.length - 1]
      : null;
    const waterText = lastWater
      ? `💧 ${timeAgo(lastWater.ts)}`
      : '💧 Henüz sulanmadı';

    el.innerHTML = `
      <div class="pin-icon" style="background:${pin.color}">
        <div class="pin-dot"></div>
      </div>
      <div class="pin-label">
        ${pin.name}
        <span class="pin-last-water">${waterText}</span>
      </div>`;

    el.addEventListener('pointerdown', onPinDown);
    pinsLayer.appendChild(el);
  });
}

function onPinDown(e) {
  if (addingMode) return;
  e.stopPropagation();
  const id = e.currentTarget.dataset.id;
  pinDragging = { id, el: e.currentTarget, startX: e.clientX, startY: e.clientY, moved: false };
  e.currentTarget.setPointerCapture(e.pointerId);
  e.currentTarget.addEventListener('pointermove', onPinMove);
  e.currentTarget.addEventListener('pointerup', onPinUp);
}

function onPinMove(e) {
  if (!pinDragging) return;
  const dx = e.clientX - pinDragging.startX;
  const dy = e.clientY - pinDragging.startY;
  if (Math.abs(dx) > 5 || Math.abs(dy) > 5) pinDragging.moved = true;
  if (!pinDragging.moved) return;
  const pin = pins.find(p => p.id === pinDragging.id);
  if (!pin) return;
  const rect = mapContainer.getBoundingClientRect();
  const mc = containerToMap(e.clientX - rect.left, e.clientY - rect.top);
  pin.x = mc.x; pin.y = mc.y;
  const c = mapToContainer(pin.x, pin.y);
  pinDragging.el.style.left = c.x + 'px';
  pinDragging.el.style.top = c.y + 'px';
}

function onPinUp(e) {
  if (!pinDragging) return;
  pinDragging.el.removeEventListener('pointermove', onPinMove);
  pinDragging.el.removeEventListener('pointerup', onPinUp);
  if (pinDragging.moved) {
    saveData();
  } else {
    const pin = pins.find(p => p.id === pinDragging.id);
    if (pin) openEditModal(pin);
  }
  pinDragging = null;
}

function openEditModal(pin) {
  editingPinId = pin.id;
  document.getElementById('modal-title').textContent = pin.name;
  pinNameInput.value = pin.name;
  modalColor = pin.color;
  modalDelete.style.display = 'inline-block';
  renderModalColors();
  renderWaterHistory(pin);
  modalOverlay.classList.add('open');
  waterDuration.value = '';
}

function openNewModal(x, y) {
  editingPinId = null;
  document.getElementById('modal-title').textContent = 'Yeni bölge';
  pinNameInput.value = '';
  modalColor = selectedColor;
  modalDelete.style.display = 'none';
  renderModalColors();
  waterHistory.innerHTML = '';
  document.getElementById('water-section').style.display = 'none';
  modalOverlay.classList.add('open');
  modalOverlay.dataset.newX = x;
  modalOverlay.dataset.newY = y;
  pinNameInput.focus();
}

function renderModalColors() {
  modalColors.innerHTML = '';
  COLORS.forEach(c => {
    const btn = document.createElement('div');
    btn.className = 'modal-color-btn' + (c === modalColor ? ' active' : '');
    btn.style.background = c;
    btn.onclick = () => { modalColor = c; renderModalColors(); };
    modalColors.appendChild(btn);
  });
}

function renderWaterHistory(pin) {
  document.getElementById('water-section').style.display = 'block';
  if (!pin.waterLog || pin.waterLog.length === 0) {
    waterHistory.innerHTML = '<div style="color:#bbb;font-style:italic">Henüz sulama kaydı yok</div>';
    return;
  }
  const last5 = [...pin.waterLog].reverse().slice(0, 5);
  waterHistory.innerHTML = last5.map(entry => {
    const d = new Date(entry.ts);
    const dateStr = d.toLocaleDateString('tr-TR', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
    return `<div class="water-entry"><span>${dateStr}</span><span>${entry.duration} dk</span></div>`;
  }).join('');
}

document.getElementById('log-water-btn').addEventListener('click', () => {
  if (!editingPinId) return;
  const dur = parseInt(waterDuration.value);
  if (!dur || dur < 1) { waterDuration.focus(); return; }
  const pin = pins.find(p => p.id === editingPinId);
  if (!pin) return;
  if (!pin.waterLog) pin.waterLog = [];
  pin.waterLog.push({ ts: Date.now(), duration: dur });
  saveData();
  renderWaterHistory(pin);
  renderPins();
  waterDuration.value = '';
});

document.getElementById('modal-save').addEventListener('click', () => {
  const name = pinNameInput.value.trim() || 'Bölge';
  if (editingPinId) {
    const pin = pins.find(p => p.id === editingPinId);
    if (pin) { pin.name = name; pin.color = modalColor; }
  } else {
    pins.push({
      id: uid(),
      x: parseFloat(modalOverlay.dataset.newX),
      y: parseFloat(modalOverlay.dataset.newY),
      name, color: modalColor,
      waterLog: []
    });
  }
  saveData(); renderPins();
  modalOverlay.classList.remove('open');
});

document.getElementById('modal-cancel').addEventListener('click', () => {
  modalOverlay.classList.remove('open');
});

modalDelete.addEventListener('click', () => {
  if (!editingPinId) return;
  if (!confirm('Bu pini silmek istiyor musun?')) return;
  pins = pins.filter(p => p.id !== editingPinId);
  saveData(); renderPins();
  modalOverlay.classList.remove('open');
});

addPinBtn.addEventListener('click', () => {
  addingMode = !addingMode;
  addPinBtn.classList.toggle('active', addingMode);
  addPinBtn.textContent = addingMode ? '✕ İptal' : '📍 Pin ekle';
  mapContainer.classList.toggle('adding', addingMode);
});

document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedColor = btn.dataset.color;
  });
});

// Pan
mapContainer.addEventListener('pointerdown', e => {
  if (addingMode || e.target.closest('.pin')) return;
  isPanning = true;
  panStart = { x: e.clientX - offsetX, y: e.clientY - offsetY };
  mapContainer.classList.add('dragging');
  mapContainer.setPointerCapture(e.pointerId);
});
mapContainer.addEventListener('pointermove', e => {
  if (!isPanning) return;
  offsetX = e.clientX - panStart.x;
  offsetY = e.clientY - panStart.y;
  applyTransform(); renderPins();
});
mapContainer.addEventListener('pointerup', () => {
  isPanning = false;
  mapContainer.classList.remove('dragging');
});

// Tıklayarak pin ekleme
mapContainer.addEventListener('click', e => {
  if (!addingMode || e.target.closest('.pin')) return;
  const rect = mapContainer.getBoundingClientRect();
  const mc = containerToMap(e.clientX - rect.left, e.clientY - rect.top);
  openNewModal(mc.x, mc.y);
  addingMode = false;
  addPinBtn.classList.remove('active');
  addPinBtn.textContent = '📍 Pin ekle';
  mapContainer.classList.remove('adding');
});

// Scroll zoom
mapContainer.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = mapContainer.getBoundingClientRect();
  const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const ns = Math.min(4, Math.max(0.25, scale * delta));
  offsetX = cx - (cx - offsetX) * (ns / scale);
  offsetY = cy - (cy - offsetY) * (ns / scale);
  scale = ns; applyTransform(); renderPins();
}, { passive: false });

// Pinch zoom
mapContainer.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });

mapContainer.addEventListener('touchmove', e => {
  if (e.touches.length !== 2) return;
  e.preventDefault();
  const dist = Math.hypot(
    e.touches[0].clientX - e.touches[1].clientX,
    e.touches[0].clientY - e.touches[1].clientY
  );
  const mid = {
    x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
    y: (e.touches[0].clientY + e.touches[1].clientY) / 2
  };
  const rect = mapContainer.getBoundingClientRect();
  const cx = mid.x - rect.left, cy = mid.y - rect.top;
  const delta = dist / lastTouchDist;
  const ns = Math.min(4, Math.max(0.25, scale * delta));
  offsetX = cx - (cx - offsetX) * (ns / scale);
  offsetY = cy - (cy - offsetY) * (ns / scale);
  scale = ns; lastTouchDist = dist;
  applyTransform(); renderPins();
}, { passive: false });

// Harita yükle
mapImg.onload = () => {
  const iw = mapImg.naturalWidth, ih = mapImg.naturalHeight;
  const cw = mapContainer.clientWidth, ch = mapContainer.clientHeight;
  scale = Math.min(cw / iw, ch / ih);
  offsetX = (cw - iw * scale) / 2;
  offsetY = (ch - ih * scale) / 2;
  applyTransform(); loadData(); renderPins();
};

mapImg.onerror = () => {
  mapContainer.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;color:#888;padding:20px;text-align:center">
      <div style="font-size:48px">🗺️</div>
      <div style="font-size:14px;font-weight:600;color:#555">Harita görseli bulunamadı</div>
      <div style="font-size:13px">Harita görselini <strong>harita.jpg</strong> adıyla<br>bu dosyanın yanına GitHub'a yükle.</div>
    </div>`;
};

mapImg.src = MAP_URL;
</script>
</body>
</html>
